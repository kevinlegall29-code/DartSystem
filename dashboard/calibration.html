<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>DartSystem — Calibration</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #0d1117; color: #e6edf3; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

    header {
      background: #161b22; border-bottom: 1px solid #30363d;
      padding: 12px 20px; display: flex; align-items: center; gap: 16px; flex-shrink: 0;
    }
    header h1 { font-size: 1.1rem; font-weight: 600; }
    .ip-row { display: flex; gap: 8px; align-items: center; margin-left: auto; }
    .ip-row label { font-size: 0.8rem; color: #8b949e; }
    .ip-row input { background: #0d1117; border: 1px solid #30363d; border-radius: 6px; color: #e6edf3; padding: 5px 10px; font-size: 0.85rem; width: 150px; }
    .btn { padding: 6px 16px; border-radius: 6px; border: none; cursor: pointer; font-size: 0.85rem; font-weight: 600; }
    .btn.primary { background: #238636; color: #fff; }
    .btn.secondary { background: #21262d; color: #e6edf3; border: 1px solid #30363d; }
    .btn.danger { background: #b62324; color: #fff; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    a.btn { text-decoration: none; display: inline-block; }

    /* Progress caméras */
    .cam-tabs {
      display: flex; background: #161b22; border-bottom: 1px solid #30363d; flex-shrink: 0;
    }
    .cam-tab {
      flex: 1; padding: 12px; text-align: center; cursor: pointer; font-size: 0.9rem;
      border-bottom: 3px solid transparent; color: #8b949e; transition: all 0.2s;
    }
    .cam-tab.active { color: #58a6ff; border-bottom-color: #58a6ff; background: #0d1117; }
    .cam-tab.done { color: #3fb950; }
    .cam-tab.done::after { content: ' ✓'; }

    /* Layout principal */
    .main { display: flex; flex: 1; overflow: hidden; }

    /* Panneau caméra (gauche) */
    .cam-panel {
      flex: 3; position: relative; background: #000; cursor: crosshair; overflow: hidden;
    }
    .cam-panel img.stream {
      width: 100%; height: 100%; object-fit: contain; display: block;
      pointer-events: none; user-select: none;
    }

    /* Points placés */
    .point-marker {
      position: absolute; width: 28px; height: 28px;
      border-radius: 50%; transform: translate(-50%, -50%);
      border: 3px solid #fff; display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700; color: #000; pointer-events: none;
    }
    .point-marker.p0 { background: #ffd700; }
    .point-marker.p1 { background: #00bfff; }
    .point-marker.p2 { background: #ff6b6b; }
    .point-marker.p3 { background: #7fff00; }

    /* Loupe */
    .magnifier {
      position: absolute; width: 150px; height: 150px; border-radius: 50%;
      border: 3px solid #ffd700; overflow: hidden; pointer-events: none;
      box-shadow: 0 0 20px rgba(255,215,0,0.5);
      display: none;
    }
    .magnifier img { position: absolute; transform-origin: top left; }

    /* Réticule au centre de la loupe */
    .magnifier::before, .magnifier::after {
      content: ''; position: absolute; background: rgba(255,215,0,0.8); z-index: 10;
    }
    .magnifier::before { width: 1px; height: 100%; left: 50%; top: 0; }
    .magnifier::after  { width: 100%; height: 1px; top: 50%; left: 0; }

    /* Panneau résultat (droite) */
    .result-panel {
      flex: 2; background: #161b22; border-left: 1px solid #30363d;
      display: flex; flex-direction: column; overflow: hidden;
    }
    .result-header {
      padding: 14px 16px; border-bottom: 1px solid #30363d;
      font-size: 0.85rem; color: #8b949e; text-transform: uppercase; letter-spacing: 0.5px;
    }

    /* Guide des 4 points */
    .points-guide { padding: 16px; border-bottom: 1px solid #21262d; }
    .point-row {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 12px; border-radius: 8px; margin-bottom: 8px;
      border: 2px solid #21262d; cursor: pointer; transition: all 0.2s;
    }
    .point-row.active { border-color: #ffd700; background: rgba(255,215,0,0.05); }
    .point-row.placed { border-color: #3fb950; background: rgba(63,185,80,0.05); cursor: default; }
    .point-dot { width: 18px; height: 18px; border-radius: 50%; flex-shrink: 0; }
    .point-dot.p0 { background: #ffd700; }
    .point-dot.p1 { background: #00bfff; }
    .point-dot.p2 { background: #ff6b6b; }
    .point-dot.p3 { background: #7fff00; }
    .point-info { flex: 1; }
    .point-name { font-size: 0.9rem; font-weight: 600; }
    .point-hint { font-size: 0.75rem; color: #8b949e; }
    .point-coords { font-size: 0.75rem; color: #3fb950; font-family: monospace; }
    .point-status { font-size: 1.1rem; }

    /* Résultat normalisé */
    .normalized-area {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      justify-content: center; padding: 16px; gap: 12px;
    }
    .normalized-area img { max-width: 100%; max-height: 280px; border-radius: 8px; border: 2px solid #30363d; }
    .normalized-placeholder {
      width: 100%; aspect-ratio: 1; max-height: 280px;
      background: #0d1117; border: 2px dashed #30363d; border-radius: 8px;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      color: #484f58; gap: 8px; font-size: 0.85rem;
    }
    .quality-badge {
      padding: 6px 16px; border-radius: 20px; font-size: 0.85rem; font-weight: 700;
    }
    .quality-badge.good  { background: #1f4a22; color: #3fb950; border: 1px solid #3fb950; }
    .quality-badge.bad   { background: #4a1f1f; color: #f85149; border: 1px solid #f85149; }

    /* Boutons d'action */
    .action-bar {
      padding: 14px 16px; border-top: 1px solid #30363d;
      display: flex; gap: 10px; flex-wrap: wrap;
    }

    /* Toast */
    .toast {
      position: fixed; bottom: 24px; right: 24px;
      background: #161b22; border: 1px solid #30363d; border-radius: 8px;
      padding: 12px 20px; font-size: 0.85rem; z-index: 100;
      opacity: 0; transition: opacity 0.3s; pointer-events: none;
    }
    .toast.show { opacity: 1; }
    .toast.ok  { border-color: #3fb950; color: #3fb950; }
    .toast.err { border-color: #f85149; color: #f85149; }

    /* Instruction flottante */
    .instruction {
      position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.75); border: 1px solid rgba(255,215,0,0.4);
      border-radius: 8px; padding: 8px 16px; font-size: 0.85rem;
      color: #ffd700; pointer-events: none; white-space: nowrap;
    }
  </style>
</head>
<body>

<header>
  <span>🎯</span>
  <h1>DartSystem — Calibration Board</h1>
  <div class="ip-row">
    <label>IP RPi :</label>
    <input id="rpi-ip" type="text" value="192.168.1.24">
    <a class="btn secondary" href="index.html">← Dashboard</a>
  </div>
</header>

<!-- Onglets caméras -->
<div class="cam-tabs">
  <div class="cam-tab active" id="tab-0" onclick="switchCamera(0)">📷 Caméra 1</div>
  <div class="cam-tab" id="tab-1" onclick="switchCamera(1)">📷 Caméra 2</div>
  <div class="cam-tab" id="tab-2" onclick="switchCamera(2)">📷 Caméra 3</div>
</div>

<div class="main">

  <!-- Flux caméra + clic -->
  <div class="cam-panel" id="cam-panel"
       onmousemove="moveMagnifier(event)"
       onmouseleave="hideMagnifier()"
       onclick="placePoint(event)">
    <img class="stream" id="cam-stream" src="" alt="Flux caméra">

    <!-- Points placés (injectés par JS) -->
    <div id="markers"></div>

    <!-- Loupe -->
    <div class="magnifier" id="magnifier">
      <img id="mag-img" src="" alt="">
    </div>

    <div class="instruction" id="instruction">Cliquez sur le fil <strong id="instr-point">20/1</strong> (intersection avec l'anneau double)</div>
  </div>

  <!-- Panneau résultat -->
  <div class="result-panel">
    <div class="result-header">⚙ Calibration — Caméra <span id="cam-label">1</span></div>

    <!-- Guide des 4 points -->
    <div class="points-guide" id="points-guide"></div>

    <!-- Vue normalisée -->
    <div class="normalized-area">
      <div class="normalized-placeholder" id="norm-placeholder">
        <span style="font-size:2rem">📐</span>
        <span>Vue normalisée après calibration</span>
        <span style="font-size:0.75rem; color:#30363d">Placez les 4 points pour commencer</span>
      </div>
      <img id="norm-img" style="display:none" alt="Vue normalisée">
      <div id="quality-badge" style="display:none"></div>
    </div>

    <!-- Actions -->
    <div class="action-bar">
      <button class="btn danger" onclick="resetPoints()">↺ Recommencer</button>
      <button class="btn primary" id="btn-calibrate" onclick="sendCalibration()" disabled>
        📐 Calibrer
      </button>
      <button class="btn secondary" id="btn-next" onclick="nextCamera()" style="display:none">
        Caméra suivante →
      </button>
      <button class="btn primary" id="btn-finish" onclick="finish()" style="display:none">
        ✓ Terminer
      </button>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
const POINT_DEFS = [
  { key: '20_1',  label: 'Fil 20 / 1',  hint: '12h — haut',   cls: 'p0' },
  { key: '6_10',  label: 'Fil 6 / 10',  hint: '3h — droite',  cls: 'p1' },
  { key: '3_19',  label: 'Fil 3 / 19',  hint: '6h — bas',     cls: 'p2' },
  { key: '11_14', label: 'Fil 11 / 14', hint: '9h — gauche',  cls: 'p3' },
];

const ZOOM = 3;
const MAG_R = 75;   // rayon loupe px

let currentCam = 0;
let points = [{}, {}, {}];      // points[camIdx][key] = {x, y, px, py}
let calibrated = [false, false, false];
let baseUrl = '';
let imgW = 1280, imgH = 720;

// ------------------------------------------------------------------
// Init
// ------------------------------------------------------------------

window.onload = () => {
  const saved = localStorage.getItem('rpi_ip');
  if (saved) document.getElementById('rpi-ip').value = saved;
  document.getElementById('rpi-ip').addEventListener('change', e => {
    localStorage.setItem('rpi_ip', e.target.value);
    updateBaseUrl();
    switchCamera(currentCam);
  });
  updateBaseUrl();
  switchCamera(0);
};

function updateBaseUrl() {
  const ip = document.getElementById('rpi-ip').value.trim();
  baseUrl = `http://${ip}:8080`;
}

// ------------------------------------------------------------------
// Navigation caméras
// ------------------------------------------------------------------

function switchCamera(idx) {
  currentCam = idx;
  document.querySelectorAll('.cam-tab').forEach((t, i) => {
    t.className = 'cam-tab' + (i === idx ? ' active' : (calibrated[i] ? ' done' : ''));
  });
  document.getElementById('cam-label').textContent = idx + 1;

  // Stream MJPEG
  const ip = document.getElementById('rpi-ip').value.trim();
  const stream = document.getElementById('cam-stream');
  stream.src = `${baseUrl}/cameras/stream/${idx}`;

  // Màj loupe
  document.getElementById('mag-img').src = stream.src;

  renderGuide();
  renderMarkers();
  renderNormalized();
  updateButtons();
}

// ------------------------------------------------------------------
// Placement des points
// ------------------------------------------------------------------

function placePoint(e) {
  const panel = document.getElementById('cam-panel');
  const rect  = panel.getBoundingClientRect();
  const stream = document.getElementById('cam-stream');

  // Dimensions réelles de l'image affichée (object-fit: contain)
  const dispW = stream.offsetWidth;
  const dispH = stream.offsetHeight;
  const scaleX = imgW / dispW;
  const scaleY = imgH / dispH;

  // Offset de l'image dans le panel (centrage contain)
  const offX = (rect.width  - dispW) / 2;
  const offY = (rect.height - dispH) / 2;

  const px = e.clientX - rect.left - offX;
  const py = e.clientY - rect.top  - offY;

  if (px < 0 || py < 0 || px > dispW || py > dispH) return;

  // Prochain point à placer
  const placed = points[currentCam];
  const nextDef = POINT_DEFS.find(d => !placed[d.key]);
  if (!nextDef) return;

  placed[nextDef.key] = {
    x: px * scaleX,   // coordonnées en pixels caméra réels
    y: py * scaleY,
    px, py,            // coordonnées d'affichage pour les markers
    dispW, dispH,
  };

  renderGuide();
  renderMarkers();
  updateButtons();
}

// ------------------------------------------------------------------
// Loupe
// ------------------------------------------------------------------

function moveMagnifier(e) {
  const panel = document.getElementById('cam-panel');
  const mag   = document.getElementById('magnifier');
  const magImg = document.getElementById('mag-img');
  const rect  = panel.getBoundingClientRect();
  const stream = document.getElementById('cam-stream');

  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;

  // Positionne la loupe au-dessus du curseur
  let lx = mx - MAG_R;
  let ly = my - MAG_R * 2 - 20;
  if (ly < 0) ly = my + 20;
  if (lx < 0) lx = 0;
  if (lx + MAG_R * 2 > rect.width) lx = rect.width - MAG_R * 2;

  mag.style.display = 'block';
  mag.style.left = lx + 'px';
  mag.style.top  = ly + 'px';
  mag.style.width  = (MAG_R * 2) + 'px';
  mag.style.height = (MAG_R * 2) + 'px';

  // Zoom : déplace l'image pour centrer sur le curseur
  const dispW = stream.offsetWidth;
  const dispH = stream.offsetHeight;
  const offX = (rect.width  - dispW) / 2;
  const offY = (rect.height - dispH) / 2;

  const imgX = mx - offX;
  const imgY = my - offY;

  magImg.style.width  = (dispW * ZOOM) + 'px';
  magImg.style.height = (dispH * ZOOM) + 'px';
  magImg.style.left   = (-imgX * ZOOM + MAG_R) + 'px';
  magImg.style.top    = (-imgY * ZOOM + MAG_R) + 'px';
}

function hideMagnifier() {
  document.getElementById('magnifier').style.display = 'none';
}

// ------------------------------------------------------------------
// Rendu UI
// ------------------------------------------------------------------

function renderGuide() {
  const placed = points[currentCam];
  const nextDef = POINT_DEFS.find(d => !placed[d.key]);
  const guide = document.getElementById('points-guide');

  guide.innerHTML = POINT_DEFS.map((d, i) => {
    const isPlaced = !!placed[d.key];
    const isActive = !isPlaced && d === nextDef;
    const cls = isPlaced ? 'placed' : (isActive ? 'active' : '');
    const coords = isPlaced
      ? `<div class="point-coords">x=${Math.round(placed[d.key].x)} y=${Math.round(placed[d.key].y)}</div>`
      : '';
    return `
      <div class="point-row ${cls}" onclick="${isPlaced ? 'removePoint(\'' + d.key + '\')' : ''}">
        <div class="point-dot ${d.cls}"></div>
        <div class="point-info">
          <div class="point-name">${i+1}. ${d.label}</div>
          <div class="point-hint">${d.hint}</div>
          ${coords}
        </div>
        <span class="point-status">${isPlaced ? '✅' : (isActive ? '👆' : '⭕')}</span>
      </div>`;
  }).join('');

  // Instruction flottante
  const instr = document.getElementById('instr-point');
  if (nextDef) {
    instr.textContent = nextDef.label;
    document.getElementById('instruction').style.display = 'block';
  } else {
    document.getElementById('instruction').style.display = 'none';
  }
}

function renderMarkers() {
  const placed = points[currentCam];
  const panel  = document.getElementById('cam-panel');
  const stream = document.getElementById('cam-stream');
  const markers = document.getElementById('markers');
  markers.innerHTML = '';

  const offX = (panel.offsetWidth  - stream.offsetWidth)  / 2;
  const offY = (panel.offsetHeight - stream.offsetHeight) / 2;

  POINT_DEFS.forEach((d, i) => {
    if (!placed[d.key]) return;
    const p = placed[d.key];
    // Recalcule la position si la fenêtre a changé de taille
    const scaleX = stream.offsetWidth  / p.dispW;
    const scaleY = stream.offsetHeight / p.dispH;
    const sx = p.px * scaleX + offX;
    const sy = p.py * scaleY + offY;

    const el = document.createElement('div');
    el.className = `point-marker ${d.cls}`;
    el.style.left = sx + 'px';
    el.style.top  = sy + 'px';
    el.textContent = i + 1;
    markers.appendChild(el);
  });
}

function renderNormalized() {
  document.getElementById('norm-img').style.display = 'none';
  document.getElementById('norm-placeholder').style.display = 'flex';
  document.getElementById('quality-badge').style.display = 'none';
  document.getElementById('btn-next').style.display   = 'none';
  document.getElementById('btn-finish').style.display = 'none';
}

function removePoint(key) {
  delete points[currentCam][key];
  // Supprime aussi les points placés après (ordre obligatoire)
  const idx = POINT_DEFS.findIndex(d => d.key === key);
  POINT_DEFS.slice(idx + 1).forEach(d => delete points[currentCam][d.key]);
  calibrated[currentCam] = false;
  renderGuide();
  renderMarkers();
  renderNormalized();
  updateButtons();
}

function updateButtons() {
  const allPlaced = POINT_DEFS.every(d => !!points[currentCam][d.key]);
  document.getElementById('btn-calibrate').disabled = !allPlaced;
}

// ------------------------------------------------------------------
// Calibration API
// ------------------------------------------------------------------

async function sendCalibration() {
  const placed = points[currentCam];
  const apiPoints = {};
  POINT_DEFS.forEach(d => {
    apiPoints[d.key] = { x: placed[d.key].x, y: placed[d.key].y };
  });

  document.getElementById('btn-calibrate').disabled = true;
  document.getElementById('btn-calibrate').textContent = '⏳ Calcul...';

  try {
    const res = await fetch(`${baseUrl}/calibration/board`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ camera_index: currentCam, points: apiPoints }),
    });
    const data = await res.json();

    if (data.success) {
      calibrated[currentCam] = true;
      showNormalized(data.normalized_image_b64, data.validation);
      updateTabs();
      toast('Calibration caméra ' + (currentCam+1) + ' sauvegardée !', 'ok');

      // Affiche bouton suivant ou terminer
      if (currentCam < 2) {
        document.getElementById('btn-next').style.display = 'inline-block';
      } else {
        document.getElementById('btn-finish').style.display = 'inline-block';
      }
    } else {
      toast('Erreur : ' + JSON.stringify(data), 'err');
    }
  } catch(e) {
    toast('Impossible de joindre l\'API : ' + e.message, 'err');
  }

  document.getElementById('btn-calibrate').disabled = false;
  document.getElementById('btn-calibrate').textContent = '📐 Calibrer';
}

function showNormalized(b64, validation) {
  const img = document.getElementById('norm-img');
  img.src = 'data:image/jpeg;base64,' + b64;
  img.style.display = 'block';
  document.getElementById('norm-placeholder').style.display = 'none';

  const score = validation?.quality_score ?? 0;
  const badge = document.getElementById('quality-badge');
  badge.style.display = 'block';
  badge.className = 'quality-badge ' + (score >= 80 ? 'good' : 'bad');
  badge.textContent = `Score qualité : ${score.toFixed(1)}%  ${score >= 80 ? '✓ Bon' : '⚠ Refaire'}`;
}

function updateTabs() {
  for (let i = 0; i < 3; i++) {
    const tab = document.getElementById('tab-' + i);
    tab.className = 'cam-tab' + (i === currentCam ? ' active' : (calibrated[i] ? ' done' : ''));
  }
}

// ------------------------------------------------------------------
// Navigation
// ------------------------------------------------------------------

function resetPoints() {
  points[currentCam] = {};
  calibrated[currentCam] = false;
  renderGuide();
  renderMarkers();
  renderNormalized();
  updateButtons();
  updateTabs();
}

function nextCamera() {
  switchCamera(currentCam + 1);
}

async function finish() {
  try {
    await fetch(`${baseUrl}/calibration/reload`, { method: 'POST' });
    toast('Calibrations rechargées dans le moteur !', 'ok');
    setTimeout(() => window.location.href = 'index.html', 1500);
  } catch(e) {
    toast('Erreur rechargement : ' + e.message, 'err');
  }
}

// ------------------------------------------------------------------
// Toast
// ------------------------------------------------------------------

function toast(msg, type = '') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show ' + type;
  setTimeout(() => el.className = 'toast', 3000);
}

// Redessine les markers si la fenêtre est redimensionnée
window.addEventListener('resize', renderMarkers);
</script>
</body>
</html>
