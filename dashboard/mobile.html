<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>DartSystem — Score</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; }
    body {
      font-family: -apple-system, 'Segoe UI', sans-serif;
      background: #0d1117;
      color: #e6edf3;
      display: flex;
      flex-direction: column;
      min-height: 100%;
      overflow: hidden;
    }

    header {
      background: #161b22;
      border-bottom: 1px solid #30363d;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }
    header h1 { font-size: 1rem; font-weight: 600; flex: 1; }
    .status-dot { width: 12px; height: 12px; border-radius: 50%; background: #f85149; transition: background .3s; }
    .status-dot.ok { background: #3fb950; box-shadow: 0 0 8px #3fb950; }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 16px;
      gap: 20px;
    }

    .turn-label {
      text-align: center;
      font-size: .8rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #8b949e;
    }

    .darts {
      display: flex;
      gap: 10px;
      justify-content: center;
    }
    .dart {
      flex: 1;
      max-width: 110px;
      aspect-ratio: 3/4;
      background: #161b22;
      border: 2px solid #21262d;
      border-radius: 14px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: all .3s;
    }
    .dart.hit {
      border-color: #388bfd;
      background: #0d1f38;
      animation: pop .35s ease;
    }
    @keyframes pop { 0% { transform: scale(1.15); } 100% { transform: scale(1); } }
    .dart .lbl { font-size: 1.8rem; font-weight: 800; color: #58a6ff; }
    .dart .pts { font-size: .75rem; color: #8b949e; margin-top: 4px; }
    .dart .empty { font-size: 1.6rem; color: #21262d; }

    .total {
      text-align: center;
    }
    .total .num {
      font-size: 5rem;
      font-weight: 800;
      color: #f0883e;
      line-height: 1;
    }
    .total .cap { font-size: .8rem; color: #8b949e; text-transform: uppercase; letter-spacing: 1px; }

    .last {
      text-align: center;
      font-size: .85rem;
      color: #8b949e;
      min-height: 1.2em;
    }

    footer {
      padding: 12px 16px;
      display: flex;
      gap: 10px;
      flex-shrink: 0;
    }
    .btn {
      flex: 1;
      padding: 16px;
      border-radius: 12px;
      border: none;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
    }
    .btn.primary { background: #238636; color: #fff; }
    .btn.secondary { background: #21262d; color: #e6edf3; border: 1px solid #30363d; }
  </style>
</head>
<body>

<header>
  <span>🎯</span>
  <h1>DartSystem</h1>
  <span class="status-dot" id="dot"></span>
</header>

<main>
  <div class="turn-label">Volée en cours</div>
  <div class="darts">
    <div class="dart" id="d0"><span class="empty">○</span></div>
    <div class="dart" id="d1"><span class="empty">○</span></div>
    <div class="dart" id="d2"><span class="empty">○</span></div>
  </div>
  <div class="total">
    <div class="num" id="total">0</div>
    <div class="cap">points</div>
  </div>
  <div class="last" id="last"></div>
</main>

<footer>
  <button class="btn secondary" onclick="resetTurn()">Effacer volée</button>
  <button class="btn primary" onclick="nextPlayer()">Joueur suivant</button>
</footer>

<script>
  const host = window.location.host;            // auto : IP:port du RPi
  const base = `http://${host}`;
  const wsUrl = `ws://${host}/game/ws`;

  let darts = [];
  let ws = null;

  function connect() {
    ws = new WebSocket(wsUrl);
    ws.onopen = () => document.getElementById('dot').classList.add('ok');
    ws.onclose = () => {
      document.getElementById('dot').classList.remove('ok');
      setTimeout(connect, 2000);
    };
    ws.onerror = () => ws.close();
    ws.onmessage = (e) => {
      const msg = JSON.parse(e.data);
      if (msg.type === 'dart_detected') {
        darts.push(msg.data);
        if (darts.length > 3) darts = darts.slice(-3);
        render();
        document.getElementById('last').textContent =
          `Dernière : ${msg.data.label} (${msg.data.score} pts)`;
      } else if (msg.type === 'takeout') {
        darts = [];
        render();
        document.getElementById('last').textContent = 'Fléchettes retirées';
      }
    };
  }

  function render() {
    let total = 0;
    for (let i = 0; i < 3; i++) {
      const el = document.getElementById('d' + i);
      const d = darts[i];
      if (d) {
        el.innerHTML = `<div class="lbl">${d.label}</div><div class="pts">${d.score} pts</div>`;
        el.classList.add('hit');
        total += d.score;
      } else {
        el.innerHTML = '<span class="empty">○</span>';
        el.classList.remove('hit');
      }
    }
    document.getElementById('total').textContent = total;
  }

  function resetTurn() {
    fetch(`${base}/game/takeout`, { method: 'POST' }).catch(() => {});
    darts = []; render();
  }
  function nextPlayer() {
    fetch(`${base}/game/takeout`, { method: 'POST' }).catch(() => {});
    darts = []; render();
  }

  connect();
</script>
</body>
</html>
