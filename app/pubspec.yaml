name: dartsystem
description: DartSystem — application de jeu de fléchettes (BLE)
publish_to: none
version: 0.1.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_blue_plus: ^1.32.0      # BLE
  provider: ^6.1.0                # state management
  shared_preferences: ^2.2.0     # mémorise le dernier appareil / client
  google_fonts: ^6.1.0           # polices par client
  permission_handler: ^11.3.0    # permissions BLE Android

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/clients/
